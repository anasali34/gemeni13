<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سیستەمی دکتۆر ئایتی - سیستەمی یەکگرتوو</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: Tahoma; }
        .card { border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
    </style>
</head>
<body class="p-4">

<!-- لۆگین -->
<div id="login-section" class="container" style="max-width:400px;">
    <div class="card text-center">
        <h3>چوونەژوورەوە</h3>
        <p class="text-danger fw-bold">پاسۆرد: 123</p>
        <input type="text" id="user" class="form-control mb-2" placeholder="بەکارهێنەر (mustafa یان staff)">
        <input type="password" id="pass" class="form-control mb-2" placeholder="پاسۆرد (123)">
        <button class="btn btn-primary w-100" onclick="login()">چوونەژوورەوە</button>
    </div>
</div>

<!-- ئەپەکە -->
<div id="main-app" class="d-none container">
    <div class="mb-4">
        <button class="btn btn-primary" onclick="show('sales-sec')">فرۆشتن</button>
        <button id="admin-tab" class="btn btn-warning d-none" onclick="show('admin-sec')">بەڕێوەبردن</button>
        <button id="debt-tab" class="btn btn-danger d-none" onclick="show('debt-sec')">قەرزداران</button>
        <button id="report-tab" class="btn btn-info d-none" onclick="show('report-sec')">مێژوو</button>
    </div>
    
    <!-- فرۆشتن -->
    <div id="sales-sec" class="card">
        <h5>فرۆشتنی نوێ</h5>
        <select id="itemList" class="form-control mb-2"></select>
        <select id="saleType" class="form-control mb-2"><option value="نەقد">نەقد</option><option value="قەرز">قەرز</option></select>
        <input type="text" id="cName" class="form-control mb-1" placeholder="ناوی کڕیار">
        <input type="text" id="cAddr" class="form-control mb-1" placeholder="ناونیشان">
        <input type="text" id="cPhone" class="form-control mb-2" placeholder="تەلەفۆن">
        <button class="btn btn-success w-100" onclick="sell()">تۆمارکردن و وەسڵی PDF</button>
    </div>

    <!-- بەڕێوەبردن -->
    <div id="admin-sec" class="d-none mt-4 card">
        <h4>بەڕێوەبردن | نرخی دۆلار: <span id="displayUsd">0</span></h4>
        <input type="number" id="newUsd" class="form-control mb-1" placeholder="نرخی دۆلار">
        <button class="btn btn-info w-100 mb-3" onclick="saveUsd()">نوێکردنەوەی نرخ</button>
        <input type="text" id="pName" class="form-control mb-1" placeholder="ناوی کاڵا">
        <button class="btn btn-success w-100" onclick="addProduct()">زیادکردنی کاڵا</button>
    </div>

    <!-- قەرزداران -->
    <div id="debt-sec" class="d-none mt-4 card"><h4>قەرزداران</h4><table class="table"><tbody id="debtTable"></tbody></table></div>
    <!-- مێژوو -->
    <div id="report-sec" class="d-none mt-4 card"><h4>مێژووی فرۆشتن</h4><table class="table"><tbody id="historyTable"></tbody></table></div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('products')) || [];
    let debts = JSON.parse(localStorage.getItem('debts')) || [];
    let history = JSON.parse(localStorage.getItem('history')) || [];
    let usd = localStorage.getItem('usd') || "0";

    function login() {
        let u = document.getElementById('user').value;
        let p = document.getElementById('pass').value;
        if((u === "mustafa" || u === "staff") && p === "123") {
            document.getElementById('login-section').classList.add('d-none');
            document.getElementById('main-app').classList.remove('d-none');
            if(u === "mustafa") {
                document.getElementById('admin-tab').classList.remove('d-none');
                document.getElementById('debt-tab').classList.remove('d-none');
                document.getElementById('report-tab').classList.remove('d-none');
            }
            render();
        } else { alert("بەکارهێنەر یان پاسۆرد هەڵەیە!"); }
    }

    function saveUsd() {
        usd = document.getElementById('newUsd').value;
        localStorage.setItem('usd', usd);
        render(); alert("نرخ نوێکرایەوە");
    }

    function addProduct() {
        let name = document.getElementById('pName').value;
        if(name) { products.push({name}); localStorage.setItem('products', JSON.stringify(products)); render(); }
    }

    function sell() {
        let item = document.getElementById('itemList').value;
        let type = document.getElementById('saleType').value;
        let name = document.getElementById('cName').value;
        let phone = document.getElementById('cPhone').value;
        
        if(!item || !name) { alert("تکایە زانیارییەکان پڕ بکەرەوە"); return; }
        
        let record = {name, item, type, time: new Date().toLocaleTimeString()};
        history.push(record);
        if(type === 'قەرز') debts.push(record);
        
        localStorage.setItem('history', JSON.stringify(history));
        localStorage.setItem('debts', JSON.stringify(debts));
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Dr. IT Mustafa Receipt", 10, 10);
        doc.text("Item: " + item, 10, 20);
        doc.text("Customer: " + name, 10, 30);
        doc.text("Type: " + type, 10, 40);
        doc.save("wesl.pdf");
        
        render(); alert("سەرکەوتوو بوو!");
    }

    function render() {
        document.getElementById('displayUsd').innerText = usd;
        document.getElementById('itemList').innerHTML = products.map(p => `<option>${p.name}</option>`).join('');
        document.getElementById('debtTable').innerHTML = debts.map(d => `<tr><td>${d.name}</td><td>${d.item}</td><td>${d.type}</td></tr>`).join('');
        document.getElementById('historyTable').innerHTML = history.map(h => `<tr><td>${h.item}</td><td>${h.type}</td><td>${h.time}</td></tr>`).join('');
    }

    function show(id) {
        ['sales-sec', 'admin-sec', 'debt-sec', 'report-sec'].forEach(s => document.getElementById(s).classList.add('d-none'));
        document.getElementById(id).classList.remove('d-none');
    }
</script>
</body>
</html>
